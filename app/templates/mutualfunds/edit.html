{% extends "base.html" %}

{% block title %}Edit Mutual Fund - StealthOak{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Edit Mutual Fund</h2>
</div>

<div class="form-container">
    {% if errors %}
        <div class="error-box">
            <strong>Please fix the following:</strong>
            <ul>
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
    {% endif %}
    
    <form method="POST" action="/mutualfunds/edit/{{ holding.id }}" class="add-form">
        <!-- Read-only Fund Info -->
        <div class="form-group">
            <label>Scheme Code</label>
            <input type="text" value="{{ holding.symbol }}" disabled>
        </div>
        
        <div class="form-group">
            <label>Fund Name</label>
            <input type="text" value="{{ holding.name }}" disabled>
        </div>
        
        <hr>
        
        <!-- Editable Fields -->
        <div class="form-row">
            <div class="form-group">
                <label for="quantity">Units *</label>
                <input 
                    type="number" 
                    id="quantity" 
                    name="quantity" 
                    value="{{ holding.quantity }}"
                    min="0.0001"
                    step="0.0001"
                    required
                >
            </div>
            
            <div class="form-group">
                <label for="avg_price">Average NAV (₹) *</label>
                <input 
                    type="number" 
                    id="avg_price" 
                    name="avg_price" 
                    value="{{ holding.avg_price }}"
                    min="0.0001"
                    step="0.0001"
                    required
                >
            </div>
        </div>
        
        <div class="form-actions">
            <a href="/mutualfunds" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">✓ Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
